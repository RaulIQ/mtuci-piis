services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.inference
    container_name: kws-api
    environment:
      MODEL_PATH: artifacts/kws_resnet.pt
      DB_PATH: /data/requests.db
    volumes:
      - inference_data:/data
      - ./artifacts:/app/artifacts:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  inference_data:
